openapi: 3.0.3
info:
  title: Knowledge Stack API
  description: Knowledge Stack backend API for authentication and knowledge management
  version: 0.1.0
servers:
- url: http://localhost:8000
  description: Knowledge Stack API local dev server
paths:
  /v1/api-keys:
    post:
      tags:
      - api-keys
      summary: Create Api Key Handler
      description: Create a new API key. The full key is returned only once.
      operationId: create_api_key
      parameters:
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - api-keys
      summary: List Api Keys Handler
      description: List all API keys for the current user.
      operationId: list_api_keys
      parameters:
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                title: Response List Api Keys
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/api-keys/{api_key_id}:
    get:
      tags:
      - api-keys
      summary: Get Api Key Handler
      description: Get a single API key by ID.
      operationId: get_api_key
      parameters:
      - name: api_key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Api Key Id
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - api-keys
      summary: Delete Api Key Handler
      description: Delete an API key.
      operationId: delete_api_key
      parameters:
      - name: api_key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Api Key Id
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/pw/email_verification:
    post:
      tags:
      - auth
      summary: Pw Email Verification Handler
      description: 'Send password user email verification email.


        This endpoint is the first step in the password user creation process.

        The user receives an email with a link to create their account.'
      operationId: pw_email_verification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailSentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/pw/user:
    post:
      tags:
      - auth
      summary: Create Password User Handler
      operationId: create_password_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePasswordUserRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/pw/signin:
    post:
      tags:
      - auth
      summary: Signin Handler
      description: 'Validate password credentials and redirect to callback.


        This endpoint validates the user''s credentials and stores the user ID

        in the session, then redirects to /auth/callback?method=pw to maintain

        consistency with OAuth flows.'
      operationId: pw_signin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/pw/send_reset_email:
    post:
      tags:
      - auth
      summary: Send Pw Reset Email Handler
      operationId: send_pw_reset_email
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailSentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/pw/reset:
    post:
      tags:
      - auth
      summary: Reset Password Handler
      description: Reset password for the authenticated user
      operationId: reset_password
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/pw/reset_with_token:
    post:
      tags:
      - auth
      summary: Reset Password With Token Handler
      description: Reset password with email verification token
      operationId: reset_password_with_token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetWithTokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/sso/initiate:
    post:
      tags:
      - auth
      summary: Initiate Sso Handler
      description: Initiate SSO with the given provider and tenant ID.
      operationId: initiate_sso
      parameters:
      - name: provider
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/IdpType'
          description: Provider to initiate SSO with
        description: Provider to initiate SSO with
      - name: tenant_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
          nullable: true
          description: Tenant ID to initiate SSO with
          title: Tenant Id
        description: Tenant ID to initiate SSO with
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOInitiateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/sso/{tenant_id}/signin:
    get:
      tags:
      - auth
      summary: Sso Login Handler
      description: 'SSO login endpoint.


        Resolves the tenant''s IdP configuration and dispatches to the

        appropriate provider-specific handler. Sets the UAT cookie and

        redirects to the frontend.'
      operationId: sso_signin
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: redirect
        in: query
        required: false
        schema:
          type: string
          description: Post-login redirect path
          default: ''
          title: Redirect
        description: Post-login redirect path
      responses:
        '307':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/sso/oauth2/callback:
    get:
      tags:
      - auth
      summary: Oauth2 Callback Handler
      description: Handle OAuth2 callback from the given OAuth client.
      operationId: oauth2_callback
      parameters:
      - name: provider
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/IdpType'
          description: Provider to initiate SSO with
        description: Provider to initiate SSO with
      - name: code
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: Authorization code from provider
          title: Code
        description: Authorization code from provider
      - name: state
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: State parameter for CSRF protection
          title: State
        description: State parameter for CSRF protection
      - name: error
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: Error code if authorization failed
          title: Error
        description: Error code if authorization failed
      - name: error_description
        in: query
        required: false
        schema:
          type: string
          nullable: true
          description: Error description
          title: Error Description
        description: Error description
      - name: tenant_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
          nullable: true
          description: Tenant ID to initiate SSO with
          title: Tenant Id
        description: Tenant ID to initiate SSO with
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/sso/{tenant_id}/directory_sync:
    post:
      tags:
      - auth
      - auth
      summary: Directory Sync Handler
      description: 'Trigger directory synchronization for a FanWei E9 tenant.


        Accepts either:

        - A logged-in OWNER/ADMIN user (via UAT cookie)

        - An admin API key (via Authorization: Bearer header)'
      operationId: fanwei_directory_sync
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorySyncResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/uat:
    post:
      tags:
      - auth
      summary: Refresh Uat Handler
      description: Refresh or switch the user's active tenant token.
      operationId: refresh_uat
      parameters:
      - name: tenant_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
          nullable: true
          description: Target tenant ID to switch to. None=refresh current tenant
          title: Tenant Id
        description: Target tenant ID to switch to. None=refresh current tenant
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/auth/signout:
    post:
      tags:
      - auth
      summary: Signout Handler
      operationId: signout
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/users/me:
    get:
      tags:
      - users
      summary: Get Me Handler
      description: 'Get current user information including current tenant context.


        Returns the authenticated user''s profile along with their current tenant
        ID

        (from the UAT token) and default tenant ID (from user record).'
      operationId: get_me
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users:
    patch:
      tags:
      - users
      summary: Update Me Handler
      description: 'Update the user''s profile (default tenant, name fields).


        When updating default_tenant_id, the user must belong to the specified tenant.'
      operationId: update_me
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants:
    get:
      tags:
      - tenants
      summary: List Tenants
      description: List all tenants the current user belongs to.
      operationId: list_tenants
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 20
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_TenantResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}:
    get:
      tags:
      - tenants
      summary: Get Tenant
      description: 'Get tenant information by ID.


        User must be a member of the tenant.'
      operationId: get_tenant
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - tenants
      summary: Update Tenant
      description: 'Update tenant configuration.


        Requires OWNER or ADMIN role in the tenant.'
      operationId: update_tenant
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - tenants
      summary: Delete Tenant
      description: 'Delete a tenant.


        Requires OWNER role in the tenant.

        Deletes the tenant''s LiteLLM team/keys and S3 bucket after the DB

        transaction commits.'
      operationId: delete_tenant
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}/users:
    get:
      tags:
      - tenants
      summary: List Tenant Users
      description: 'List members of a tenant with pagination.


        Requires OWNER or ADMIN membership in the tenant.'
      operationId: list_tenant_users
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of items per page
          default: 20
          title: Limit
        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_TenantUserResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}/users/{user_id}/deactivate:
    post:
      tags:
      - tenants
      summary: Deactivate Tenant User Handler
      description: 'Deactivate a tenant user (soft delete).


        The user''s group memberships in this tenant are permanently removed.

        They will not be restored on reactivation and must be re-added manually.'
      operationId: deactivate_tenant_user
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}/users/{user_id}/activate:
    post:
      tags:
      - tenants
      summary: Activate Tenant User Handler
      description: Reactivate a deactivated tenant user.
      operationId: activate_tenant_user
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}/users/{user_id}:
    delete:
      tags:
      - tenants
      summary: Delete Tenant User Handler
      description: 'Remove a user from a tenant (hard delete).


        Only non-directory-synced users can be removed. Directory-synced

        users must be managed via directory sync.'
      operationId: delete_tenant_user
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - tenants
      summary: Update Tenant User
      description: 'Update a user''s role in a tenant.


        Requires OWNER or ADMIN role. Cannot create a duplicate owner.'
      operationId: update_tenant_user
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Tenant Id
      - name: user_id
        in: path
