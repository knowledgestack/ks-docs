        description: Number of items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_FeedbackEventResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/feedback/{feedback_id}:
    delete:
      tags:
      - Feedback
      summary: Delete Feedback Handler
      description: 'Delete a feedback entry.


        USER role: can only delete their own feedback.

        OWNER/ADMIN role: can delete any feedback.

        Returns 404 if the feedback does not exist.

        Returns 403 if the user does not own the feedback and is not OWNER/ADMIN.'
      operationId: delete_feedback
      parameters:
      - name: feedback_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Feedback Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          nullable: true
          title: Authorization
      - name: ks_uat
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Ks Uat
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      summary: Root Handler
      description: Root endpoint.
      operationId: hello
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootResponse'
  /healthz:
    get:
      summary: Health Check Handler
      description: Health check endpoint.
      operationId: health_check
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
